name: Linting
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Pylint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - uses: actions/setup-python@master
        with:
          python-version: '3.13'
          architecture: x64
      - name: Install Starsim
        run: pip install -e .[dev]
      - name: Run pylint
        run: pylint starsim --rcfile=.pylintrc
