# Test that docs build successfully on pushes to main
# and PRs targeting main.

name: Test docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Install Starsim and test docs build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install Starsim
      run: pip install -e .[dev]

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Install Quarto interlinks
      working-directory: ./docs
      run: quarto add machow/quartodoc --no-prompt

    - name: Render docs
      working-directory: ./docs
      run: ./render
