name: Coverage
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  coverage:
    name: Test coverage
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - uses: actions/setup-python@master
        with:
          python-version: '3.13'
          architecture: x64
      - name: Install Starsim
        run: pip install -e .[dev]
      - name: Run tests with coverage
        working-directory: ./tests
        run: pytest test_*.py -n auto --cov-config=.coveragerc --cov=../starsim --durations=0
      - name: Print coverage report
        working-directory: ./tests
        run: coverage report
